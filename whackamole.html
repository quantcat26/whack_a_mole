<!DOCTYPE html>
<html>
<head>
    <title>Whack-a-Mole</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
    let timeRemaining = 3;          // Amount of time remaining for the countdown

    let timeToShowMole = 2000;      // Amount of time to show the mole
    let timeToHideMole = 2000;      // Amount of time to hide the mole

    let hideMoleTimeout;            // Timeout id for hiding the mole

    let life = 3;                   // The player's life

    function hideMole() {
        // Change the life and the colour of the holes
        life = life - 1;
        if(life == 2){
            $(".hole").css("border-color", "#FF0");
        } else if(life == 1){
            $(".hole").css("border-color", "#F00");
        }
        // If the game is over show the game over screen
        else{
            $("#gameover").fadeIn(500);
        }


        // Hide the mole
        $("#mole").hide();

        // Show the mole later again
        showMoleTimeoutId = setTimeout(showMole, timeToShowMole);
    }

    function showMole() {
        // Find the target div randomly and move the mole
        // to that div
        let holes = $(".hole");
        let holeIndex = parseInt(Math.random()*10) % 8;
        $("#mole").appendTo(holes.eq(holeIndex));

        // Show the mole
        $("#mole").show();

        // Hide the mole later
        hideMoleTimeoutId = setTimeout(hideMole, timeToHideMole);
    }

    function startGame() {
        // Hide the countdown timer
        $("#countdown").fadeOut(500);

        // Show the mole the first time
        setTimeout(showMole, timeToShowMole);

        // Set up the click handler of the mole
        // - Clear the previous timeout
        // - Hide the mole
        // - Adjust the mole time
        // - Show the mole later again
        $("#mole").on("click", function(){
            clearTimeout(hideMoleTimeoutId);
            $("#mole").hide();
            timeToHideMole = timeToHideMole - 100;
            setTimeout(showMole, timeToShowMole);
        })
    }

    function countdown() {
        // Decrease the remaining time
        timeRemaining = timeRemaining - 1;
        $("#countdown").text(timeRemaining);

        // Continue the countdown if there is still time;
        // otherwise, start the game when the time is up
        if (timeRemaining > 0){
            setTimeout( countdown, 1000);
        } else{
            $("#countdown").text("Start");
            startGame();
        }
    }

    $(function() {
        // Start the countdown screen
        setTimeout(countdown, 1000);
    });
    </script>

    <!-- This is the font returned from Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">

    <style>
    /* This is the style of the body element */
    body {
        font-family: 'Gloria Hallelujah', cursive;
        margin: 0;
        padding: 0;
        background: white url(grass.png);
        background-size: 25% auto;
    }

    /* Set the common style for the countdown and gameover divs */
    #countdown, #gameover {
        position: absolute;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        padding: 0;
        text-align: center;
        font-size: 20vh;
        line-height: 100vh;
        background-color: rgba(0, 0, 0, 0.8);
    }

    /* - Set the properties for the countdown div */
    #countdown {
        color: yellow;
    }

    /* - Set the properties for the gameover div */
    #gameover {
        color: red;
        display: none;
    }

    /* Set the style of the game area */
    #game-area {
        width: 90vmin;
        height: 90vmin;
        margin: 5vmin auto;
    }

    /* - Set the style of the holes */
    .hole {
        float: left;
        width: 25vmin;
        height: 25vmin;
        border: 1vmin solid green;
        background-color: black;
        border-radius: 12vmin;
        margin: 1vmin;
    }

    /* - Set the style of the mole image */
    #mole {
        display: grid;
        float: left;
        width: 95%;
        height: 95%;
        place-self: center;
        display: none;
    }
    </style>
</head>
<body>
    <!-- This div contains all holes -->
    <div id="game-area">
        <div class="hole">
            <!-- This is the mole -->
            <img id="mole" src="mole.png" alt="The mole">
        </div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
    </div>

    <!-- The countdown screen -->
    <div id="countdown">3</div>

    <!-- The gameover screen -->
    <div id="gameover">Game Over</div>
</body>
</html>
